<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>wikipath — six degrees, streaming</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main>
    <header>
      <h1>wikipath</h1>
      <p class="tagline">find the shortest Wikipedia hop chain between two famous people, watched live.</p>
    </header>

    <section class="controls">
      <div class="row">
        <label>
          From
          <input id="from" list="people" autocomplete="off" placeholder="e.g. Taylor Swift" />
        </label>
        <label>
          To
          <input id="to" list="people" autocomplete="off" placeholder="e.g. Ho Chi Minh" />
        </label>
      </div>
      <datalist id="people"></datalist>
      <button id="go" disabled>Start search</button>
    </section>

    <section class="output">
      <div class="card">
        <h2>Path</h2>
        <ol id="path" class="path"></ol>
        <p id="path-meta" class="muted"></p>
      </div>
      <div class="card">
        <h2>Live log</h2>
        <ul id="log" class="log"></ul>
      </div>
    </section>

    <footer>
      <p>built from the clean-room SPEC of Rani Saro's <em>Six Degrees of Wikipedia</em>. learning project, MIT.</p>
    </footer>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
